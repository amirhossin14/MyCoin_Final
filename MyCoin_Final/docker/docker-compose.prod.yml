version: '3.9'

# ════════════════════════════════════════════════════════════
#  🐳 Docker Compose — MyCoin Production
#  معماری: HA Cluster + PostgreSQL + Monitoring Stack
# ════════════════════════════════════════════════════════════

x-node-common: &node-common
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  environment:
    - NODE_ENV=production
    - DB_HOST=postgres
    - DB_PORT=5432
    - DB_NAME=${DB_NAME:-mycoin}
    - DB_USER=${DB_USER:-mycoin}
    - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
    - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
    - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
    - RATE_GLOBAL=${RATE_GLOBAL:-300}
    - RATE_AUTH=${RATE_AUTH:-10}
    - DDOS_REQ_PER_SEC=${DDOS_REQ_PER_SEC:-50}
    - DDOS_BLOCK_THRESHOLD=${DDOS_BLOCK_THRESHOLD:-200}
    - IP_WHITELIST=127.0.0.1,::1,172.0.0.0/8
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - backend
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:

  # ════════════════════════════════════════════════════════
  #  نودهای MyCoin (HA)
  # ════════════════════════════════════════════════════════
  node1:
    <<: *node-common
    container_name: mycoin-node1
    hostname: node1
    environment:
      - PORT=3000
      - STRATUM_PORT=3333
      - NODE_ID=node1
      - PEER_URL=http://node2:3000
    volumes:
      - node1-data:/app/data
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  node2:
    <<: *node-common
    container_name: mycoin-node2
    hostname: node2
    environment:
      - PORT=3000
      - STRATUM_PORT=3333
      - NODE_ID=node2
      - PEER_URL=http://node1:3000
    volumes:
      - node2-data:/app/data
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  node3:
    <<: *node-common
    container_name: mycoin-node3
    hostname: node3
    environment:
      - PORT=3000
      - STRATUM_PORT=3333
      - NODE_ID=node3
      - PEER_URL=http://node1:3000
    volumes:
      - node3-data:/app/data
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ════════════════════════════════════════════════════════
  #  HAProxy Load Balancer
  # ════════════════════════════════════════════════════════
  haproxy:
    image: haproxy:2.8-alpine
    container_name: mycoin-haproxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "3333:3333"     # Stratum
      - "8404:8404"     # Stats
    volumes:
      - ./ha/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./ha/certs:/usr/local/etc/haproxy/certs:ro
      - ./ha/errors:/usr/local/etc/haproxy/errors:ro
    depends_on:
      - node1
      - node2
      - node3
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 30s

  # ════════════════════════════════════════════════════════
  #  PostgreSQL (Primary)
  # ════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: mycoin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-mycoin}
      POSTGRES_USER:     ${DB_USER:-mycoin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1GB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=3
      - -c
      - log_min_duration_statement=500
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mycoin} -d ${DB_NAME:-mycoin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── PostgreSQL Exporter ───────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: mycoin-pg-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-mycoin}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-mycoin}?sslmode=disable"
    networks:
      - backend

  # ════════════════════════════════════════════════════════
  #  Redis (Session + Rate Limit Store)
  # ════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: mycoin-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 256mb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: mycoin-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR:     redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
    networks:
      - backend

  # ════════════════════════════════════════════════════════
  #  Prometheus
  # ════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: mycoin-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - backend
    ports:
      - "9090:9090"

  # ════════════════════════════════════════════════════════
  #  Grafana
  # ════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: mycoin-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP:     false
      GF_SERVER_ROOT_URL:         https://${DOMAIN:-localhost}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: true
      GF_ANALYTICS_REPORTING_ENABLED: false
      GF_AUTH_ANONYMOUS_ENABLED:  false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/mycoin.json:ro
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    depends_on:
      - prometheus
    networks:
      - backend
    ports:
      - "3001:3000"

  # ════════════════════════════════════════════════════════
  #  Node Exporter (متریک‌های سیستم‌عامل)
  # ════════════════════════════════════════════════════════
  node-exporter:
    image: prom/node-exporter:latest
    container_name: mycoin-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - backend
    pid: host

  # ════════════════════════════════════════════════════════
  #  Alertmanager
  # ════════════════════════════════════════════════════════
  alertmanager:
    image: prom/alertmanager:latest
    container_name: mycoin-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - backend
    ports:
      - "9093:9093"

# ════════════════════════════════════════════════════════
#  Networks
# ════════════════════════════════════════════════════════
networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  backend:
    driver: bridge
    internal: true       # بدون دسترسی مستقیم از اینترنت
    ipam:
      config:
        - subnet: 172.21.0.0/24

# ════════════════════════════════════════════════════════
#  Volumes
# ════════════════════════════════════════════════════════
volumes:
  node1-data:
  node2-data:
  node3-data:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:
